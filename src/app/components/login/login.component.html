<div class="login-container d-flex align-items-center justify-content-center">
  <div class="card shadow-lg border-0" style="max-width: 450px; width: 100%;">
    <div class="card-body p-5">
      <!-- Logo et Titre -->
      <div class="text-center mb-4">
        <img src="img/logo_v2.png" alt="MediPay Logo" class="mb-3 logo-size">
        <!-- <h2 class="fw-bold text-medipay-blue mt-text">MediPay</h2> -->
        <p class="text-muted small">Système de Paiement Santé Sécurisé</p>
      </div>

      <!-- Formulaire -->
      <form (submit)="onLogin($event)">
        <div class="mb-3">
          <label class="form-label text-medipay-blue fw-semibold">Nom d'utilisateur</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control bg-light border-start-0"
                   [(ngModel)]="username" name="username" placeholder="Ex: admin" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label text-medipay-blue fw-semibold">Mot de passe</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control bg-light border-start-0"
                   [(ngModel)]="password" name="password" placeholder="••••••••" required>
          </div>
        </div>

        @if (errorMessage) {
          <div class="alert alert-danger small py-2 mb-3">
            {{ errorMessage }}
          </div>
        }

        <button type="submit" class="btn btn-medipay w-100 py-2 fw-bold shadow-sm" [disabled]="isLoading">
          @if (isLoading) {
            <span class="spinner-border spinner-border-sm me-2"></span> Connexion...
          } @else {
            Se connecter
          }
        </button>
      </form>

      <div class="text-center mt-4">
        <a href="#" class="text-decoration-none small text-medipay-blue opacity-75">Mot de passe oublié ?</a>
      </div>
    </div>
  </div>
</div>
