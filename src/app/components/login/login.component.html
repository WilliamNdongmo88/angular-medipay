<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light py-5">
  <div class="card border-0 shadow-lg rounded-4 overflow-hidden" style="max-width: 450px; width: 90%;">

    <!-- Header de la carte -->
    <div class="bg-medipay-blue p-4 text-center text-white">
      <img src="img/logo_v2.png" alt="MediPay" class="mb-3 logo-size">
      <h4 class="fw-bold mb-0">Connexion</h4>
      <p class="small opacity-75 mb-0">Accédez à votre espace santé sécurisé</p>
    </div>

    <div class="card-body p-4 p-md-5">
      @if (errorMessage) {
        <div class="alert alert-danger small border-0 shadow-sm mb-4 animate__animated animate__shakeX">
          <i class="bi bi-exclamation-circle-fill me-2"></i> {{ errorMessage }}
        </div>
      }

      <form (submit)="onLogin($event)">
        <!-- Identifiant -->
        <div class="mb-3">
          <label class="form-label small fw-bold">Nom d'utilisateur</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-muted"></i></span>
            <input type="text" class="form-control border-start-0" [(ngModel)]="username" name="username" placeholder="Ex: soh_maturin" required>
          </div>
        </div>

        <!-- Mot de passe -->
        <div class="mb-2">
          <label class="form-label small fw-bold">Mot de passe</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
            <input type="password" class="form-control border-start-0" [(ngModel)]="password" name="password" placeholder="••••••••" required>
          </div>
        </div>

        <!-- MOT DE PASSE OUBLIÉ -->
        <div class="text-end mb-4">
          <a routerLink="/forgot-password" class="text-medipay-blue small text-decoration-none fw-bold opacity-75 hover-opacity-100">
            Mot de passe oublié ?
          </a>
        </div>

        <button type="submit" class="btn btn-medipay w-100 fw-bold py-3 rounded-3 shadow-sm mb-4" [disabled]="isLoading()">
          @if (isLoading()) { <span class="spinner-border spinner-border-sm me-2"></span> } Se connecter
        </button>

        <!-- INSCRIPTION -->
        <div class="text-center pt-3 border-top">
          <p class="small text-muted mb-0">
            Nouveau sur MediPay ?
            <a routerLink="/register" class="text-medipay-blue fw-bold text-decoration-none ms-1">
              Créer un compte gratuitement
            </a>
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
